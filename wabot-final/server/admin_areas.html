<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BigBot Admin · ניהול אזורים</title>
<style>
:root{--g:#2e7d32;--gd:#1b5e20;--gl:#e8f5e9;--r:#d32f2f;--sl:#37474f;--gray:#90a4ae;--border:#e0e0e0;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,"Segoe UI",Heebo,Arial,sans-serif;background:#f0f2f5;color:var(--sl);display:flex;flex-direction:column;}

header{background:var(--gd);color:white;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
header h1{font-size:17px;font-weight:700;}
.hbadge{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 14px;font-size:13px;font-weight:600;}

.topbar{padding:8px 16px;background:white;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar input{width:100%;padding:7px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;direction:rtl;}

.cols{display:flex;gap:12px;padding:10px 14px 0;flex:1;overflow:hidden;min-height:0;}
.col{background:white;border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;flex:1;overflow:hidden;}
.col-header{padding:9px 14px;background:var(--gl);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.col-title{font-weight:700;font-size:14px;color:var(--gd);}
.col-count{font-size:12px;color:var(--gray);}
.col-toolbar{padding:6px 10px;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;flex-shrink:0;}
.col-body{flex:1;overflow-y:auto;}

/* Item rows */
.item{display:flex;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid #f5f5f5;transition:background .1s;min-height:36px;}
.item:hover{background:#fafafa;}
.item.known{background:#f1f8e9;}
.item.editing{background:#fffde7 !important;}

.item-count{font-size:11px;color:var(--gray);background:#f5f5f5;border-radius:10px;padding:1px 6px;white-space:nowrap;flex-shrink:0;}
.badge-known{font-size:10px;color:var(--gd);background:#c8e6c9;border-radius:10px;padding:1px 7px;white-space:nowrap;flex-shrink:0;}

/* Editable text */
.item-short{font-size:13px;font-weight:700;color:var(--gd);min-width:40px;cursor:text;border-radius:4px;padding:1px 4px;}
.item-short:hover{background:#e8f5e9;outline:1px dashed var(--g);}
.item-short:focus{background:white;outline:2px solid var(--g);border-radius:4px;}
.item-sep{font-size:11px;color:var(--gray);flex-shrink:0;}
.item-full{font-size:13px;color:var(--sl);flex:1;cursor:text;border-radius:4px;padding:1px 4px;}
.item-full:hover{background:#f5f5f5;outline:1px dashed var(--border);}
.item-full:focus{background:white;outline:2px solid var(--g);border-radius:4px;}
.item-name{font-size:13px;flex:1;cursor:text;border-radius:4px;padding:1px 4px;}
.item-name:hover{background:#f5f5f5;outline:1px dashed var(--border);}
.item-name:focus{background:white;outline:2px solid var(--g);border-radius:4px;}

/* Buttons */
.btn-del{background:none;border:1px solid #ffcdd2;color:var(--r);border-radius:5px;padding:2px 7px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0;}
.btn-del:hover{background:var(--r);color:white;}
.saving-indicator{font-size:11px;color:var(--g);flex-shrink:0;display:none;}
.item.saving .saving-indicator{display:inline;}

.tbtn{padding:5px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
.tbtn-g{background:var(--gl);color:var(--gd);}.tbtn-g:hover{background:var(--gd);color:white;}
.tbtn-r{background:#ffebee;color:var(--r);}.tbtn-r:hover{background:var(--r);color:white;}

.bottombar{flex-shrink:0;background:white;border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.save-btn{background:var(--gd);color:white;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.save-btn:hover{background:var(--g);}
.save-btn:disabled{opacity:.5;cursor:not-allowed;}
.stats{font-size:12px;color:var(--gray);}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--gd);color:white;padding:9px 20px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:999;opacity:0;transition:opacity .2s;font-size:13px;pointer-events:none;}
.toast.show{opacity:1;}.toast.err{background:var(--r);}
.empty,.loading{text-align:center;padding:30px;color:var(--gray);font-size:13px;}
</style>
</head>
<body>

<header>
  <h1>🛠️ BigBot Admin · ניהול אזורים</h1>
  <span class="hbadge" id="totalBadge">טוען...</span>
</header>

<div class="topbar">
  <input type="text" id="searchInput" placeholder="🔍 חפש בשתי הרשימות..." oninput="onSearch()"/>
</div>

<div class="cols">
  <!-- RIGHT: Shortcuts -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">🔑 קיצורים</span>
      <span class="col-count" id="shortCount">—</span>
    </div>
    <div class="col-toolbar">
      <button class="tbtn tbtn-g" onclick="restoreAll('short')">↺ שחזר הכל</button>
      <button class="tbtn tbtn-r" onclick="removeNew('short')">✕ מחק רק חדשים</button>
    </div>
    <div class="col-body" id="shortBody"></div>
  </div>

  <!-- LEFT: Full city names -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">🏙️ ערים מלאות</span>
      <span class="col-count" id="cityCount">—</span>
    </div>
    <div class="col-toolbar">
      <button class="tbtn tbtn-g" onclick="restoreAll('city')">↺ שחזר הכל</button>
      <button class="tbtn tbtn-r" onclick="removeNew('city')">✕ מחק רק חדשים</button>
    </div>
    <div class="col-body" id="cityBody"></div>
  </div>
</div>

<div class="bottombar">
  <button class="save-btn" id="saveBtn" onclick="saveToDb()">💾 אשר ושמור למאגר</button>
  <span class="stats" id="statsText"></span>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://api.bigbotdrivers.com';
let token = localStorage.getItem('bb_token') || '';

let allShorts = [];   // {name, count, known, fullName, dbId}
let allCities = [];   // {name, count, known, dbId}
let viewShorts = [];
let viewCities = [];
let searchTerm = '';
let searchTimer = null;
let syncing = false;

// ─── Auth ────────────────────────────────────────────────────────────────────
async function ensureToken() {
  if (token) return;
  const res = await fetch(API + '/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:'admin@drybot.com', password:'password123'})
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.message||'login failed');
  token = d.token; localStorage.setItem('bb_token', token);
}

async function apiFetch(path, opts={}) {
  await ensureToken();
  const res = await fetch(API + path, {
    ...opts, headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}
  });
  if (res.status===401){ token=''; localStorage.removeItem('bb_token'); await ensureToken(); throw new Error('פג תוקף'); }
  if (!res.ok){ const d=await res.json().catch(()=>({})); throw new Error(d.message||'שגיאת שרת'); }
  return res.json();
}

// ─── Load ────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('shortBody').innerHTML = '<div class="loading">טוען...</div>';
  document.getElementById('cityBody').innerHTML  = '<div class="loading">טוען...</div>';
  try {
    // Load JSON files + DB shortcuts in parallel
    const [shorts, cities, dbData] = await Promise.all([
      fetch('/data/shortcuts.json').then(r=>r.json()),
      fetch('/data/fullNames.json').then(r=>r.json()),
      loadAllDbShortcuts()
    ]);

    // Build lookup: shortName → {fullName, _id}
    const dbMap = {};
    dbData.forEach(d => { dbMap[d.shortName] = { fullName: d.fullName, id: d._id }; });

    // Enrich shorts with fullName from DB
    allShorts = shorts.map(s => ({
      ...s,
      fullName: dbMap[s.name]?.fullName || s.name,
      dbId: dbMap[s.name]?.id || null
    }));
    allCities = cities.map(c => {
      // try to find by fullName in DB
      const dbEntry = dbData.find(d => d.fullName === c.name);
      return { ...c, dbId: dbEntry?._id || null };
    });

    viewShorts = [...allShorts];
    viewCities = [...allCities];
    renderAll();
    updateStats();
  } catch(e) {
    document.getElementById('shortBody').innerHTML = `<div class="empty">שגיאה: ${e.message}</div>`;
    document.getElementById('cityBody').innerHTML  = `<div class="empty">שגיאה: ${e.message}</div>`;
    showToast(e.message, true);
  }
}

async function loadAllDbShortcuts() {
  const results = [];
  let page = 1;
  while (true) {
    const data = await apiFetch(`/api/areas/shortcuts?page=${page}&limit=100&sortBy=shortName&sortOrder=asc`);
    results.push(...(data.data||[]));
    if (page >= (data.totalPages||1)) break;
    page++;
  }
  return results;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  const q = searchTerm.toLowerCase();
  const fs = q ? viewShorts.filter(x=>x.name.toLowerCase().includes(q)||x.fullName.toLowerCase().includes(q)) : viewShorts;
  const fc = q ? viewCities.filter(x=>x.name.toLowerCase().includes(q)) : viewCities;

  renderShorts('shortBody', fs);
  renderCities('cityBody', fc);

  document.getElementById('shortCount').textContent = fs.length+'/'+allShorts.length;
  document.getElementById('cityCount').textContent  = fc.length+'/'+allCities.length;
  document.getElementById('totalBadge').textContent = (allShorts.length+allCities.length)+' פריטים מוכנים';
  updateStats();
}

function renderShorts(containerId, items) {
  const el = document.getElementById(containerId);
  if (!items.length){ el.innerHTML='<div class="empty">ריק</div>'; return; }
  el.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item' + (item.known?' known':'');
    div.id = 'si-'+encodeId(item.name);
    div.dataset.name = item.name;
    div.innerHTML = shortRowHtml(item);
    el.appendChild(div);
  });
}

function renderCities(containerId, items) {
  const el = document.getElementById(containerId);
  if (!items.length){ el.innerHTML='<div class="empty">ריק</div>'; return; }
  el.innerHTML = '';
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item' + (item.known?' known':'');
    div.id = 'ci-'+encodeId(item.name);
    div.dataset.name = item.name;
    div.innerHTML = cityRowHtml(item);
    el.appendChild(div);
  });
}

function shortRowHtml(item) {
  return `
    <button class="btn-del" onclick="removeItem('short','${esc(item.name)}')">✕</button>
    <span class="item-count">${item.count}×</span>
    <span class="item-short" contenteditable="true" spellcheck="false"
      onblur="saveShortBlur(this,'${esc(item.name)}')"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(item.name)}</span>
    <span class="item-sep">→</span>
    <span class="item-full" contenteditable="true" spellcheck="false"
      onblur="saveFullBlur(this,'${esc(item.name)}')"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(item.fullName)}</span>
    ${item.known ? '<span class="badge-known">קיים ב-DB</span>' : ''}
    <span class="saving-indicator">✓</span>`;
}

function cityRowHtml(item) {
  return `
    <button class="btn-del" onclick="removeItem('city','${esc(item.name)}')">✕</button>
    <span class="item-count">${item.count}×</span>
    <span class="item-name" contenteditable="true" spellcheck="false"
      onblur="saveCityBlur(this,'${esc(item.name)}')"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${esc(item.name)}</span>
    ${item.known ? '<span class="badge-known">קיים ב-DB</span>' : ''}
    <span class="saving-indicator">✓</span>`;
}

// ─── Auto-save on blur ────────────────────────────────────────────────────────
async function saveShortBlur(el, origName) {
  const newShort = el.textContent.trim();
  if (!newShort || newShort === origName) return;
  const div = el.closest('.item');
  const fullEl = div.querySelector('.item-full');
  const newFull = fullEl ? fullEl.textContent.trim() : newShort;
  await _saveShort(div, origName, newShort, newFull);
  el.setAttribute('onblur', `saveShortBlur(this,'${esc(newShort)}')`);
}

async function saveFullBlur(el, origName) {
  const div = el.closest('.item');
  const shortEl = div.querySelector('.item-short');
  const newShort = shortEl ? shortEl.textContent.trim() : origName;
  const newFull = el.textContent.trim();
  if (!newFull || newFull === (viewShorts.find(x=>x.name===origName)||{}).fullName) return;
  await _saveShort(div, origName, newShort, newFull);
}

async function _saveShort(div, origName, newShort, newFull) {
  const item = viewShorts.find(x=>x.name===origName) || allShorts.find(x=>x.name===origName);
  if (!item) return;
  const ind = div.querySelector('.saving-indicator');
  div.classList.add('saving');
  if (item.known && item.dbId) {
    try {
      await apiFetch('/api/areas/shortcuts/'+item.dbId, {
        method:'PUT', body:JSON.stringify({shortName:newShort, fullName:newFull||newShort})
      });
    } catch(e) { div.classList.remove('saving'); return showToast('שגיאה: '+e.message, true); }
  }
  item.name=newShort; item.fullName=newFull||newShort;
  const ai=allShorts.find(x=>x.name===origName);
  if(ai){ai.name=newShort;ai.fullName=newFull||newShort;}
  div.classList.remove('saving');
  showToast('נשמר ✓');
}

async function saveCityBlur(el, origName) {
  const newName = el.textContent.trim();
  if (!newName || newName === origName) return;
  const div = el.closest('.item');
  const item = viewCities.find(x=>x.name===origName) || allCities.find(x=>x.name===origName);
  if (!item) return;
  div.classList.add('saving');
  if (item.known && item.dbId) {
    try {
      await apiFetch('/api/areas/shortcuts/'+item.dbId, {
        method:'PUT', body:JSON.stringify({fullName:newName})
      });
    } catch(e) { div.classList.remove('saving'); return showToast('שגיאה: '+e.message, true); }
  }
  item.name=newName;
  const ai=allCities.find(x=>x.name===origName);
  if(ai) ai.name=newName;
  div.classList.remove('saving');
  el.setAttribute('onblur',`saveCityBlur(this,'${esc(newName)}')`);
  showToast('נשמר ✓');
}

// ─── Remove / Restore ─────────────────────────────────────────────────────────
function removeItem(type, name) {
  if (type==='short') viewShorts = viewShorts.filter(x=>x.name!==name);
  else                viewCities = viewCities.filter(x=>x.name!==name);
  renderAll();
}
function restoreAll(type) {
  if (type==='short') viewShorts=[...allShorts];
  else                viewCities=[...allCities];
  renderAll();
}
function removeNew(type) {
  if (type==='short') viewShorts=viewShorts.filter(x=>x.known);
  else                viewCities=viewCities.filter(x=>x.known);
  renderAll();
}

// ─── Save to DB ───────────────────────────────────────────────────────────────
function updateStats() {
  const ns = viewShorts.filter(x=>!x.known).length;
  const nc = viewCities.filter(x=>!x.known).length;
  document.getElementById('statsText').textContent =
    `יתווסף ל-DB: ${ns} קיצורים חדשים, ${nc} ערים חדשות (סה"כ ${ns+nc})`;
  document.getElementById('saveBtn').disabled = (ns+nc)===0;
}

async function saveToDb() {
  const ns = viewShorts.filter(x=>!x.known);
  const nc = viewCities.filter(x=>!x.known);
  if (!ns.length&&!nc.length) return;
  if (!confirm(`להוסיף ${ns.length} קיצורים ו-${nc.length} ערים למאגר?`)) return;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='⏳ שומר...';
  let saved=0, failed=0;
  for (const s of ns) {
    try { await apiFetch('/api/areas/shortcuts',{method:'POST',body:JSON.stringify({shortName:s.name,fullName:s.fullName||s.name})}); s.known=true; saved++; } catch { failed++; }
  }
  for (const c of nc) {
    try { await apiFetch('/api/areas/shortcuts',{method:'POST',body:JSON.stringify({shortName:c.name,fullName:c.name})}); c.known=true; saved++; } catch { failed++; }
  }
  allShorts.forEach(x=>{const f=ns.find(s=>s.name===x.name);if(f)x.known=true;});
  allCities.forEach(x=>{const f=nc.find(s=>s.name===x.name);if(f)x.known=true;});
  renderAll();
  btn.textContent='💾 אשר ושמור למאגר';
  showToast(`נשמרו ${saved} פריטים${failed?' ('+failed+' נכשלו)':''}  ✓`, failed>0);
}

// ─── Scroll sync ──────────────────────────────────────────────────────────────
function syncScroll(el,from) {
  if(syncing)return; syncing=true;
  document.getElementById(from==='short'?'cityBody':'shortBody').scrollTop=el.scrollTop;
  setTimeout(()=>syncing=false,40);
}

// ─── Search ───────────────────────────────────────────────────────────────────
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{searchTerm=document.getElementById('searchInput').value.trim();renderAll();},250);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function encodeId(s){ return String(s).replace(/[^a-zA-Z0-9\u0590-\u05FF]/g,'_'); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg,isErr=false){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast show'+(isErr?' err':'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',3500);
}

init();
</script>
</body>
</html>
