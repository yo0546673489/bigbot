<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BigBot Admin · ניהול אזורים</title>
<style>
:root{--g:#2e7d32;--gd:#1b5e20;--gl:#e8f5e9;--r:#d32f2f;--sl:#37474f;--gray:#90a4ae;--border:#e0e0e0;--purple:#7b1fa2;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,"Segoe UI",Heebo,Arial,sans-serif;background:#f0f2f5;color:var(--sl);display:flex;flex-direction:column;}

/* Header */
header{background:var(--gd);color:white;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
header h1{font-size:17px;font-weight:700;}
.hbadge{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 12px;font-size:13px;}

/* Search bar */
.topbar{padding:10px 16px;background:white;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar input{width:100%;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;direction:rtl;}

/* Two columns */
.cols{display:flex;gap:12px;padding:12px 16px 0;flex:1;overflow:hidden;min-height:0;}
.col{background:white;border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;flex:1;overflow:hidden;}
.col-header{padding:10px 14px;background:var(--gl);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.col-title{font-weight:700;font-size:14px;color:var(--gd);}
.col-count{font-size:12px;color:var(--gray);background:#f5f5f5;border-radius:20px;padding:2px 10px;}
.col-toolbar{padding:6px 10px;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;flex-shrink:0;}
.col-body{flex:1;overflow-y:auto;}

/* Row */
.item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f5f5f5;transition:background .12s;}
.item:hover{background:#f9fbe7;}
.item.editing{background:#fffde7;}
.item-text{flex:1;font-size:13px;}
.item-input{flex:1;font-size:13px;padding:3px 6px;border:1px solid var(--g);border-radius:5px;background:white;outline:none;font-family:inherit;}

/* Buttons */
.btn{padding:6px 12px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.btn-g{background:var(--gd);color:white;}.btn-g:hover{background:var(--g);}
.btn-sm{padding:4px 9px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
.btn-add{background:#e8f5e9;color:var(--gd);}.btn-add:hover{background:var(--gd);color:white;}
.btn-del{background:#ffebee;color:var(--r);border:none;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:12px;font-weight:700;line-height:1;}
.btn-del:hover{background:var(--r);color:white;}
.btn-edit{background:#e3f2fd;color:#1565c0;border:none;border-radius:5px;padding:3px 7px;cursor:pointer;font-size:11px;font-weight:600;}
.btn-edit:hover{background:#1565c0;color:white;}
.btn-save{background:var(--gl);color:var(--gd);border:none;border-radius:5px;padding:3px 7px;cursor:pointer;font-size:11px;font-weight:600;}
.btn-save:hover{background:var(--gd);color:white;}
.btn-cancel{background:#f5f5f5;color:var(--gray);border:none;border-radius:5px;padding:3px 7px;cursor:pointer;font-size:11px;}

/* Add-input row */
.add-row{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f0f7f0;border-bottom:1px solid var(--border);}
.add-row input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;}

/* Bottom bar */
.bottombar{flex-shrink:0;background:white;border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--gray);}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--gd);color:white;padding:9px 20px;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:999;opacity:0;transition:opacity .2s;font-size:13px;pointer-events:none;}
.toast.show{opacity:1;}
.toast.err{background:var(--r);}
.empty,.loading{text-align:center;padding:30px;color:var(--gray);font-size:13px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--gd);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <h1>🛠️ BigBot Admin · ניהול אזורים</h1>
  <span class="hbadge" id="totalBadge">טוען...</span>
</header>

<div class="topbar">
  <input type="text" id="searchInput" placeholder="🔍 חפש בשתי הרשימות..." oninput="onSearch()"/>
</div>

<div class="cols">
  <!-- Right: Shortcuts -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">🔑 קיצורים</span>
      <span class="col-count" id="shortCount">—</span>
    </div>
    <div class="col-toolbar">
      <button class="btn-sm btn-add" onclick="openAdd('short')">+ הוסף</button>
      <button class="btn-sm" style="background:#f5f5f5;color:var(--sl);" onclick="reload()">↺ רענן</button>
    </div>
    <div id="addShort" style="display:none" class="add-row">
      <input id="newShortName" placeholder="קיצור חדש (לדוגמה: בב)"/>
      <input id="newShortFull" placeholder="שם עיר (לדוגמה: בני ברק)"/>
      <button class="btn-save" onclick="saveNew()">✓</button>
      <button class="btn-cancel" onclick="closeAdd()">✕</button>
    </div>
    <div class="col-body" id="shortBody" onscroll="onScroll()">
      <div class="loading">טוען...</div>
    </div>
  </div>

  <!-- Left: Full city names -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">🏙️ ערים מלאות</span>
      <span class="col-count" id="cityCount">—</span>
    </div>
    <div class="col-toolbar">
      <span style="font-size:12px;color:var(--gray);padding:4px 2px;">עריכה דרך עמודת הקיצורים</span>
    </div>
    <div class="col-body" id="cityBody" onscroll="syncScroll(event, 'city')">
      <div class="loading">טוען...</div>
    </div>
  </div>
</div>

<div class="bottombar">
  <span id="pageInfo"></span>
  <span id="loadingMore"></span>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://api.bigbotdrivers.com';
let token = localStorage.getItem('bb_token') || '';
let items = [];      // all loaded items
let page = 1;
let limit = 60;
let totalItems = 0;
let totalPages = 1;
let searchTerm = '';
let searchTimer = null;
let addOpen = false;
let fetchingMore = false;
let allLoaded = false;
let syncingScroll = false;

// ─── Auth ────────────────────────────────────────────────────────────────────
async function ensureToken() {
  if (token) return;
  const res = await fetch(API + '/api/auth/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email:'admin@drybot.com', password:'password123'})
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.message || 'login failed');
  token = d.token;
  localStorage.setItem('bb_token', token);
}

async function apiFetch(path, opts={}) {
  await ensureToken();
  const res = await fetch(API + path, {
    ...opts,
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}
  });
  if (res.status === 401) { token=''; localStorage.removeItem('bb_token'); await ensureToken(); throw new Error('פג תוקף'); }
  if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.message||'שגיאת שרת'); }
  return res.json();
}

// ─── Load ────────────────────────────────────────────────────────────────────
async function reload() {
  page = 1; allLoaded = false; items = [];
  document.getElementById('shortBody').innerHTML = '<div class="loading">טוען...</div>';
  document.getElementById('cityBody').innerHTML  = '<div class="loading">טוען...</div>';
  await fetchPage(1, false);
}

async function fetchPage(pg, append) {
  if (fetchingMore) return;
  fetchingMore = true;
  if (append) document.getElementById('loadingMore').innerHTML = '<span class="spinner"></span> טוען עוד...';
  try {
    const params = new URLSearchParams({page: pg, limit, sortBy:'shortName', sortOrder:'asc'});
    if (searchTerm) params.set('search', searchTerm);
    const data = await apiFetch('/api/areas/shortcuts?' + params);
    totalItems = data.total || 0;
    totalPages = data.totalPages || 1;
    page = pg;
    allLoaded = pg >= totalPages;
    const newItems = data.data || [];
    if (append) {
      items = items.concat(newItems);
    } else {
      items = newItems;
    }
    renderBoth(append);
    document.getElementById('totalBadge').textContent = totalItems + ' פריטים';
    document.getElementById('shortCount').textContent = totalItems + '/' + totalItems;
    document.getElementById('cityCount').textContent  = totalItems + '/' + totalItems;
    document.getElementById('pageInfo').textContent = allLoaded ? 'כל הפריטים נטענו' : `נטענו ${items.length} מתוך ${totalItems}`;
  } catch(e) {
    document.getElementById('shortBody').innerHTML = `<div class="empty">שגיאה: ${e.message}</div>`;
    document.getElementById('cityBody').innerHTML  = `<div class="empty">שגיאה: ${e.message}</div>`;
    showToast(e.message, true);
  } finally {
    fetchingMore = false;
    document.getElementById('loadingMore').textContent = '';
  }
}

function renderBoth(append) {
  const sb = document.getElementById('shortBody');
  const cb = document.getElementById('cityBody');
  if (!append) { sb.innerHTML = ''; cb.innerHTML = ''; }

  const newItems = append ? items.slice(items.length - (items.length - sb.querySelectorAll('.item').length)) : items;
  // simpler: re-render all if not appending
  if (!append) {
    if (!items.length) {
      sb.innerHTML = '<div class="empty">לא נמצאו קיצורים</div>';
      cb.innerHTML = '<div class="empty">לא נמצאו ערים</div>';
      return;
    }
    items.forEach(item => { appendShortRow(item, sb); appendCityRow(item, cb); });
  } else {
    // append only new rows
    const existCount = sb.querySelectorAll('.item').length;
    items.slice(existCount).forEach(item => { appendShortRow(item, sb); appendCityRow(item, cb); });
  }
}

function appendShortRow(item, container) {
  const div = document.createElement('div');
  div.className = 'item';
  div.id = 'short-' + item._id;
  div.dataset.id = item._id;
  div.dataset.orig = item.shortName || '';
  div.innerHTML = `
    <button class="btn-del" onclick="deleteItem('${item._id}')">✕</button>
    <span class="item-text">${esc(item.shortName||'')}</span>
    <button class="btn-edit" onclick="editShort('${item._id}')">✏️ ערוך</button>`;
  container.appendChild(div);
}

function appendCityRow(item, container) {
  const div = document.createElement('div');
  div.className = 'item';
  div.id = 'city-' + item._id;
  div.dataset.id = item._id;
  div.dataset.orig = item.fullName || '';
  div.innerHTML = `
    <button class="btn-del" onclick="deleteItem('${item._id}')">✕</button>
    <span class="item-text">${esc(item.fullName||'')}</span>
    <button class="btn-edit" onclick="editCity('${item._id}')">✏️ ערוך</button>`;
  container.appendChild(div);
}

// ─── Edit short ──────────────────────────────────────────────────────────────
function editShort(id) {
  const div = document.getElementById('short-' + id);
  if (!div) return;
  const orig = div.dataset.orig;
  div.classList.add('editing');
  div.innerHTML = `
    <button class="btn-del" onclick="deleteItem('${id}')">✕</button>
    <input class="item-input" id="editShortVal-${id}" value="${esc(orig)}"/>
    <button class="btn-save"   onclick="saveShort('${id}')">💾</button>
    <button class="btn-cancel" onclick="cancelShort('${id}')">✕</button>`;
  document.getElementById('editShortVal-' + id).focus();
}

function cancelShort(id) {
  const div = document.getElementById('short-' + id);
  if (!div) return;
  div.classList.remove('editing');
  div.innerHTML = `
    <button class="btn-del" onclick="deleteItem('${id}')">✕</button>
    <span class="item-text">${esc(div.dataset.orig)}</span>
    <button class="btn-edit" onclick="editShort('${id}')">✏️ ערוך</button>`;
}

async function saveShort(id) {
  const inp = document.getElementById('editShortVal-' + id);
  if (!inp) return;
  const shortName = inp.value.trim();
  if (!shortName) return showToast('קיצור לא יכול להיות ריק', true);
  // get fullName from city div
  const cityDiv = document.getElementById('city-' + id);
  const fullName = cityDiv ? cityDiv.dataset.orig : shortName;
  await saveRecord(id, shortName, fullName);
  const div = document.getElementById('short-' + id);
  if (div) { div.dataset.orig = shortName; div.classList.remove('editing');
    div.innerHTML = `<button class="btn-del" onclick="deleteItem('${id}')">✕</button><span class="item-text">${esc(shortName)}</span><button class="btn-edit" onclick="editShort('${id}')">✏️ ערוך</button>`; }
}

// ─── Edit city ───────────────────────────────────────────────────────────────
function editCity(id) {
  const div = document.getElementById('city-' + id);
  if (!div) return;
  const orig = div.dataset.orig;
  div.classList.add('editing');
  div.innerHTML = `
    <button class="btn-del" onclick="deleteItem('${id}')">✕</button>
    <input class="item-input" id="editCityVal-${id}" value="${esc(orig)}"/>
    <button class="btn-save"   onclick="saveCity('${id}')">💾</button>
    <button class="btn-cancel" onclick="cancelCity('${id}')">✕</button>`;
  document.getElementById('editCityVal-' + id).focus();
}

function cancelCity(id) {
  const div = document.getElementById('city-' + id);
  if (!div) return;
  div.classList.remove('editing');
  div.innerHTML = `
    <button class="btn-del" onclick="deleteItem('${id}')">✕</button>
    <span class="item-text">${esc(div.dataset.orig)}</span>
    <button class="btn-edit" onclick="editCity('${id}')">✏️ ערוך</button>`;
}

async function saveCity(id) {
  const inp = document.getElementById('editCityVal-' + id);
  if (!inp) return;
  const fullName = inp.value.trim();
  const shortDiv = document.getElementById('short-' + id);
  const shortName = shortDiv ? shortDiv.dataset.orig : fullName;
  await saveRecord(id, shortName, fullName);
  const div = document.getElementById('city-' + id);
  if (div) { div.dataset.orig = fullName; div.classList.remove('editing');
    div.innerHTML = `<button class="btn-del" onclick="deleteItem('${id}')">✕</button><span class="item-text">${esc(fullName)}</span><button class="btn-edit" onclick="editCity('${id}')">✏️ ערוך</button>`; }
}

async function saveRecord(id, shortName, fullName) {
  try {
    await apiFetch('/api/areas/shortcuts/' + id, {
      method:'PUT', body: JSON.stringify({shortName, fullName})
    });
    showToast('נשמר ✓');
  } catch(e) { showToast('שגיאה: ' + e.message, true); throw e; }
}

// ─── Delete ───────────────────────────────────────────────────────────────────
async function deleteItem(id) {
  if (!confirm('למחוק פריט זה?')) return;
  try {
    await apiFetch('/api/areas/shortcuts/' + id, {method:'DELETE'});
    document.getElementById('short-' + id)?.remove();
    document.getElementById('city-' + id)?.remove();
    totalItems--;
    document.getElementById('totalBadge').textContent = totalItems + ' פריטים';
    showToast('נמחק ✓');
  } catch(e) { showToast('שגיאה: ' + e.message, true); }
}

// ─── Add ─────────────────────────────────────────────────────────────────────
function openAdd() {
  addOpen = true;
  document.getElementById('addShort').style.display = 'flex';
  document.getElementById('newShortName').focus();
}
function closeAdd() {
  addOpen = false;
  document.getElementById('addShort').style.display = 'none';
  document.getElementById('newShortName').value = '';
  document.getElementById('newShortFull').value = '';
}
async function saveNew() {
  const shortName = document.getElementById('newShortName').value.trim();
  const fullName  = document.getElementById('newShortFull').value.trim();
  if (!shortName) return showToast('חובה להזין קיצור', true);
  try {
    await apiFetch('/api/areas/shortcuts', {
      method:'POST', body: JSON.stringify({shortName, fullName: fullName||shortName})
    });
    closeAdd();
    showToast('נוסף ✓');
    reload();
  } catch(e) { showToast('שגיאה: ' + e.message, true); }
}

// ─── Scroll sync + infinite scroll ───────────────────────────────────────────
function onScroll() {
  const sb = document.getElementById('shortBody');
  const cb = document.getElementById('cityBody');
  if (!syncingScroll) {
    syncingScroll = true;
    cb.scrollTop = sb.scrollTop;
    setTimeout(() => syncingScroll = false, 50);
  }
  // infinite scroll
  if (!fetchingMore && !allLoaded && sb.scrollHeight - sb.scrollTop - sb.clientHeight < 150) {
    fetchPage(page + 1, true);
  }
}

function syncScroll(e, from) {
  if (syncingScroll) return;
  syncingScroll = true;
  const other = from === 'city' ? document.getElementById('shortBody') : document.getElementById('cityBody');
  other.scrollTop = e.target.scrollTop;
  setTimeout(() => syncingScroll = false, 50);
}

// ─── Search ───────────────────────────────────────────────────────────────────
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = document.getElementById('searchInput').value.trim();
    reload();
  }, 350);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr?' err':'');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.className='toast', 3000);
}

reload();
</script>
</body>
</html>
